<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
        <h1>Entre em <span>Contato</span></h1>
        <p>Fale com a gente e encontre o quadro perfeito para o seu espaço.</p>
        <button class="botao">Fale Conosco</button>
    </div>

    <div class="canais">
        <div class="conteudo">
            <div class="card-contato">
                <div class="card-topo">
                    <h2>Canais de <span>Contato</span></h2>
                </div>

                <div class="card-info">
                    <p>
                        <img src="icons/telefone.png" alt="Telefone"> (00) 00000-0000</p>
                    <p>
                        <img src="icons/email.png" alt="E-mail"> contato@seuquadro.com.br</p>

                    <div class="redes">
                        <a href="#"><img src="icons/facebook.png" alt="Facebook"></a>
                        <a href="#"><img src="icons/wpp.png" alt="WhatsApp"></a>
                        <a href="#"><img src="icons/instagram.png" alt="Instagram"></a>
                    </div>
                </div>
            </div>

            <div class="mapa">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3557.6017062409073!2d-48.66690908914839!3d-26.916132876547618!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94d8cb8842138761%3A0x648dbc8d0ef634c1!2sUniversidade%20do%20Vale%20do%20Itaja%C3%AD%2C%20Campus%20Itaja%C3%AD!5e0!3m2!1spt-BR!2sbr!4v1778683766484!5m2!1spt-BR!2sbr" loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <div class="formulario">
        <div class="conteudo">
            <div class="foto-galeria"></div>

            <div class="caixa-form">
                <h2>Envie uma <span>Mensagem</span></h2>

                <form>
                    <input type="text" placeholder="Nome Completo">
                    <input type="text" placeholder="Telefone">
                    <input type="email" placeholder="E-mail">
                    <textarea placeholder="Mensagem"></textarea>
                    <button class="botao" type="submit">Enviar</button>
                </form>
            </div>
        </div>
    </div>
    
</body>
</html>
